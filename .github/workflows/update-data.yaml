name: Update Data

on:
  schedule:
    - cron: '0 19 * * 0'  # every sunday at 19 utc
  workflow_dispatch:       # manual

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: dev

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r main/requirements.txt

      - run: python main/main.py --rebuild 400
        env:
          OSU_CLIENT_ID: ${{ secrets.OSU_CLIENT_ID }}
          OSU_CLIENT_SECRET: ${{ secrets.OSU_CLIENT_SECRET }}

      - name: Commit updated JSON to dev
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "chore: weekly data rebuild"
          git push

      - name: Merge dev → main
        run: |
          git fetch origin main:main
          git checkout main
          git merge dev --no-edit
          git push origin main